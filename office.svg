<svg viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>

    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3730a3" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="g-kai"  cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#f59e0b" stop-opacity="0.28"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
    <radialGradient id="g-alex" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#6366f1" stop-opacity="0.28"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0"/></radialGradient>
    <radialGradient id="g-maya" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ec4899" stop-opacity="0.28"/><stop offset="100%" stop-color="#ec4899" stop-opacity="0"/></radialGradient>
    <radialGradient id="g-sam"  cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#10b981" stop-opacity="0.28"/><stop offset="100%" stop-color="#10b981" stop-opacity="0"/></radialGradient>
    <radialGradient id="g-lee"  cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#38bdf8" stop-opacity="0.28"/><stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/></radialGradient>

    <filter id="blur-sm"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur-xs"><feGaussianBlur stdDeviation="3"/></filter>

    <style>
      @keyframes dash-in  { from { stroke-dashoffset: 80; } to { stroke-dashoffset: 0; } }
      @keyframes dash-out { from { stroke-dashoffset: 0;  } to { stroke-dashoffset: -80; } }
      @keyframes pulse    { 0%,100% { opacity: .5; r: 40; } 50% { opacity: 0; r: 58; } }
      @keyframes pulse-lg { 0%,100% { opacity: .35; r: 52; } 50% { opacity: 0; r: 72; } }
      @keyframes blink    { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
      @keyframes float    { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      @keyframes fadein   { from { opacity: 0; } to { opacity: 1; } }
      @keyframes particle { 0% { offset-distance: 0%;   opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }

      .line-alex { stroke: #818cf8; stroke-width: 1.4; stroke-dasharray: 6 4; animation: dash-in 2s linear infinite; }
      .line-maya { stroke: #f472b6; stroke-width: 1.4; stroke-dasharray: 6 4; animation: dash-in 2.4s linear infinite; }
      .line-sam  { stroke: #34d399; stroke-width: 1.4; stroke-dasharray: 6 4; animation: dash-in 2.8s linear infinite; }
      .line-lee  { stroke: #7dd3fc; stroke-width: 1.4; stroke-dasharray: 6 4; animation: dash-in 2.2s linear infinite; }

      .pulse-alex { animation: pulse 2.2s ease-in-out infinite; }
      .pulse-kai  { animation: pulse-lg 2.8s ease-in-out infinite; }
      .blink      { animation: blink 1.2s ease-in-out infinite; }
      .float      { animation: float 4s ease-in-out infinite; }
      .label      { font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    </style>

    <!-- Particle paths (motion path along the connection lines) -->
    <path id="path-alex" d="M450,260 L210,140"/>
    <path id="path-maya" d="M450,260 L690,140"/>
    <path id="path-sam"  d="M450,260 L210,380"/>
    <path id="path-lee"  d="M450,260 L690,380"/>
  </defs>

  <!-- ── Background ── -->
  <rect width="900" height="520" fill="#06060f"/>
  <rect width="900" height="520" fill="url(#grid)"/>
  <ellipse cx="450" cy="260" rx="320" ry="220" fill="url(#bg-glow)"/>

  <!-- corner accents -->
  <rect x="0" y="0" width="120" height="1" fill="rgba(99,102,241,0.3)"/>
  <rect x="0" y="0" width="1" height="120" fill="rgba(99,102,241,0.3)"/>
  <rect x="780" y="0" width="120" height="1" fill="rgba(99,102,241,0.2)"/>
  <rect x="899" y="0" width="1" height="120" fill="rgba(99,102,241,0.2)"/>
  <rect x="0" y="519" width="120" height="1" fill="rgba(99,102,241,0.15)"/>
  <rect x="780" y="519" width="120" height="1" fill="rgba(99,102,241,0.15)"/>

  <!-- ── Task banner ── -->
  <rect x="290" y="20" width="320" height="34" rx="10" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="318" y="42" class="label" font-size="12" fill="rgba(255,255,255,0.45)">Task</text>
  <text x="350" y="42" class="label" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">→  Build the onboarding flow</text>

  <!-- ── Glow halos ── -->
  <circle cx="450" cy="260" r="90" fill="url(#g-kai)" filter="url(#blur-sm)"/>
  <circle cx="210" cy="140" r="66" fill="url(#g-alex)" filter="url(#blur-sm)"/>
  <circle cx="690" cy="140" r="66" fill="url(#g-maya)" filter="url(#blur-sm)"/>
  <circle cx="210" cy="380" r="66" fill="url(#g-sam)"  filter="url(#blur-sm)"/>
  <circle cx="690" cy="380" r="66" fill="url(#g-lee)"  filter="url(#blur-sm)"/>

  <!-- ── Connection lines ── -->
  <line x1="450" y1="260" x2="248" y2="158" class="line-alex" opacity="0.55"/>
  <line x1="450" y1="260" x2="652" y2="158" class="line-maya" opacity="0.55"/>
  <line x1="450" y1="260" x2="248" y2="362" class="line-sam"  opacity="0.55"/>
  <line x1="450" y1="260" x2="652" y2="362" class="line-lee"  opacity="0.55"/>

  <!-- particles on lines -->
  <circle r="3" fill="#818cf8" opacity="0.9">
    <animateMotion dur="2.1s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#path-alex"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#f472b6" opacity="0.9">
    <animateMotion dur="2.5s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#path-maya"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#34d399" opacity="0.9">
    <animateMotion dur="2.9s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1" calcMode="linear">
      <mpath href="#path-sam"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.9s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#7dd3fc" opacity="0.9">
    <animateMotion dur="2.3s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1" calcMode="linear">
      <mpath href="#path-lee"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.3s" repeatCount="indefinite"/>
  </circle>

  <!-- ── KAI — Supervisor (center) ── -->
  <circle cx="450" cy="260" r="72" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 6" opacity="0.3" class="pulse-kai"/>
  <circle cx="450" cy="260" r="48" fill="#0e0e1e" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="270" text-anchor="middle" font-size="26">👔</text>
  <text x="450" y="322" class="label" text-anchor="middle" font-size="13" font-weight="700" fill="white">Kai</text>
  <text x="450" y="338" class="label" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="1">SUPERVISOR</text>
  <!-- status dot -->
  <circle cx="482" cy="234" r="6" fill="#0e0e1e" stroke="#f59e0b" stroke-width="1"/>
  <circle cx="482" cy="234" r="3.5" fill="#f59e0b"/>

  <!-- ── ALEX — Developer (top-left) ── -->
  <circle cx="210" cy="140" r="40" fill="none" stroke="#6366f1" stroke-width="1" opacity="0" class="pulse-alex">
    <animate attributeName="r" values="38;56;38" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="210" cy="140" r="38" fill="#0e0e1e" stroke="#6366f1" stroke-width="1.8"/>
  <text x="210" y="149" text-anchor="middle" font-size="20">💻</text>
  <text x="210" y="192" class="label" text-anchor="middle" font-size="13" font-weight="700" fill="white">Alex</text>
  <text x="210" y="207" class="label" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="1">DEVELOPER</text>
  <!-- status: thinking -->
  <circle cx="240" cy="112" r="6" fill="#0e0e1e" stroke="#f97316" stroke-width="1"/>
  <circle cx="240" cy="112" r="3.5" fill="#f97316" class="blink"/>
  <text x="250" y="116" class="label" font-size="9" fill="#f97316">Thinking…</text>

  <!-- ── MAYA — Designer (top-right) ── -->
  <circle cx="690" cy="140" r="38" fill="#0e0e1e" stroke="#ec4899" stroke-width="1.8"/>
  <text x="690" y="149" text-anchor="middle" font-size="20">🎨</text>
  <text x="690" y="192" class="label" text-anchor="middle" font-size="13" font-weight="700" fill="white">Maya</text>
  <text x="690" y="207" class="label" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="1">DESIGNER</text>
  <!-- status: speaking -->
  <circle cx="720" cy="112" r="6" fill="#0e0e1e" stroke="#22c55e" stroke-width="1"/>
  <circle cx="720" cy="112" r="3.5" fill="#22c55e" class="blink"/>
  <text x="730" y="116" class="label" font-size="9" fill="#22c55e">Speaking</text>
  <!-- speech bubble -->
  <g class="float">
    <rect x="586" y="54" width="172" height="32" rx="8" fill="rgba(15,15,30,0.95)" stroke="rgba(236,72,153,0.35)" stroke-width="1"/>
    <polygon points="698,86 710,86 704,96" fill="rgba(15,15,30,0.95)" stroke="rgba(236,72,153,0.35)" stroke-width="1" stroke-linejoin="round"/>
    <text x="597" y="74" class="label" font-size="11" fill="rgba(255,255,255,0.85)">"Redesigning the welcome screen"</text>
  </g>

  <!-- ── SAM — Analyst (bottom-left) ── -->
  <circle cx="210" cy="380" r="38" fill="#0e0e1e" stroke="#10b981" stroke-width="1.8"/>
  <text x="210" y="389" text-anchor="middle" font-size="20">🔬</text>
  <text x="210" y="432" class="label" text-anchor="middle" font-size="13" font-weight="700" fill="white">Sam</text>
  <text x="210" y="447" class="label" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="1">ANALYST</text>
  <!-- status: idle -->
  <circle cx="240" cy="353" r="6" fill="#0e0e1e" stroke="#6b7280" stroke-width="1"/>
  <circle cx="240" cy="353" r="3.5" fill="#6b7280"/>
  <text x="250" y="357" class="label" font-size="9" fill="rgba(255,255,255,0.35)">Idle</text>

  <!-- ── LEE — Writer (bottom-right) ── -->
  <circle cx="690" cy="380" r="38" fill="#0e0e1e" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="690" y="389" text-anchor="middle" font-size="20">✍️</text>
  <text x="690" y="432" class="label" text-anchor="middle" font-size="13" font-weight="700" fill="white">Lee</text>
  <text x="690" y="447" class="label" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="1">WRITER</text>
  <!-- status: idle -->
  <circle cx="720" cy="353" r="6" fill="#0e0e1e" stroke="#6b7280" stroke-width="1"/>
  <circle cx="720" cy="353" r="3.5" fill="#6b7280"/>
  <text x="730" y="357" class="label" font-size="9" fill="rgba(255,255,255,0.35)">Idle</text>

  <!-- ── Bottom status bar ── -->
  <rect x="260" y="480" width="380" height="28" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <circle cx="278" cy="494" r="4" fill="#22c55e"/>
  <text x="290" y="498" class="label" font-size="11" fill="rgba(255,255,255,0.5)">Connected · ws://localhost:8000/ws/1</text>

  <!-- ── "Neo" watermark ── -->
  <text x="450" y="265" text-anchor="middle" class="label" font-size="9" font-weight="600" fill="rgba(255,255,255,0.08)" letter-spacing="4">NEO WORKSPACE</text>
</svg>
